name: Hospital Management Docker CI/CD

on:
  push:
    branches:
      - main

jobs:

  docker-deploy:

    name: Deploy Docker Container

    runs-on: ubuntu-latest

    steps:

      # =========================================
      # CHECKOUT REPOSITORY
      # =========================================

      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================
      # UPLOAD FILES TO SERVER
      # =========================================

      - name: Upload project files to server
        uses: appleboy/scp-action@v0.1.7

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}

          port: 22

          source: "./"

          target: "/home/s2209682-node/htdocs/s2209682n.ncgrp.xyz/Cloud/hospital-room-management"

          strip_components: 1

      # =========================================
      # BUILD & RESTART DOCKER CONTAINER
      # =========================================

      - name: Build and restart Docker container
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}

          port: 22

          script: |

            set -e

            export PATH=$PATH:/usr/bin:/usr/local/bin

            APP_DIR="/home/s2209682-node/htdocs/s2209682n.ncgrp.xyz/Cloud/hospital-room-management"

            CONTAINER_NAME="hospital-system"

            IMAGE_NAME="hospital-system:latest"

            cd "$APP_DIR"

            echo "========================================="
            echo "CURRENT DIRECTORY"
            echo "========================================="

            pwd

            echo "========================================="
            echo "PROJECT FILES"
            echo "========================================="

            ls -la

            # =========================================
            # VERIFY DOCKERFILE EXISTS
            # =========================================

            if [ ! -f Dockerfile ]; then

              echo "ERROR: Dockerfile not found"

              exit 1

            fi

            # =========================================
            # STOP OLD CONTAINER
            # =========================================

            docker stop "$CONTAINER_NAME" || true

            docker rm "$CONTAINER_NAME" || true

            # =========================================
            # REMOVE OLD IMAGE
            # =========================================

            docker rmi "$IMAGE_NAME" || true

            # =========================================
            # CLEAN UNUSED DOCKER FILES
            # =========================================

            docker system prune -f || true

            # =========================================
            # BUILD NEW IMAGE
            # =========================================

            docker build -t "$IMAGE_NAME" .

            # =========================================
            # START NEW CONTAINER
            # =========================================

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --env-file .env \
              -p 3040:3040 \
              "$IMAGE_NAME"

            # =========================================
            # VERIFY RUNNING CONTAINER
            # =========================================

            echo "========================================="
            echo "RUNNING CONTAINERS"
            echo "========================================="

            docker ps

            echo "========================================="
            echo "CONTAINER LOGS"
            echo "========================================="

            docker logs "$CONTAINER_NAME"
