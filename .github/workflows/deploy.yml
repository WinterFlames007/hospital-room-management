name: Hospital Management Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  docker-deploy:
    name: Deploy Docker Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4



      - name: Upload project files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "app.js,server.js,package.json,package-lock.json,Dockerfile,config,controllers,middleware,public,routes,utils,views,uploads,testing,tests,README.md"
          target: "/home/s2209682-node/htdocs/s2209682n.ncgrp.xyz/Cloud/hospital-room-management"
          overwrite: true


      - name: Build and restart Docker container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -e

            export PATH=$PATH:/usr/bin:/usr/local/bin:/home/s2209682-node/.nvm/versions/node/v22.22.0/bin

            APP_DIR="/home/s2209682-node/htdocs/s2209682n.ncgrp.xyz/Cloud/hospital-room-management"
            CONTAINER_NAME="hospital-system"
            IMAGE_NAME="hospital-system:latest"
            APP_PORT="3040"

            cd "$APP_DIR"

            echo "CURRENT DIRECTORY"
            pwd

            echo "PROJECT FILES"
            ls -la

            if [ ! -f Dockerfile ]; then
              echo "ERROR: Dockerfile not found"
              exit 1
            fi

            echo "STOP PM2 APP IF RUNNING"
            pm2 stop hospital-management || true
            pm2 delete hospital-management || true

            echo "STOP OLD DOCKER CONTAINER"
            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true

            echo "REMOVE CONTAINERS USING PORT $APP_PORT"
            PORT_CONTAINERS=$(docker ps -aq --filter "publish=${APP_PORT}")
            if [ -n "$PORT_CONTAINERS" ]; then
              docker stop $PORT_CONTAINERS || true
              docker rm $PORT_CONTAINERS || true
            fi

            echo "FREE PORT $APP_PORT"
            fuser -k "${APP_PORT}/tcp" || true
            sleep 3

            echo "CHECK PORT"
            netstat -tulpn | grep "$APP_PORT" || true

            echo "REMOVE OLD IMAGE"
            docker rmi "$IMAGE_NAME" || true


            echo "RUN AUTOMATED TESTS ON SERVER"
            npm install
            npm test

            echo "BUILD NEW IMAGE"
            docker build -t "$IMAGE_NAME" .

            echo "START NEW CONTAINER"
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --env-file .env \
              -p "${APP_PORT}:${APP_PORT}" \
              "$IMAGE_NAME"

            echo "VERIFY CONTAINER"
            docker ps
            docker logs "$CONTAINER_NAME"
