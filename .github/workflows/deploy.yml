name: Hospital Management CI/CD

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      # =========================================
      # CHECKOUT REPOSITORY
      # =========================================

      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================
      # DEPLOY FILES TO CLOUDPANEL
      # =========================================

      - name: Deploy to CloudPanel Server
        uses: appleboy/scp-action@v0.1.7

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}

          source: "."
          target: "/home/s2209682-node/htdocs/s2209682n.ncgrp.xyz/Cloud/hospital-room-management"

      # =========================================
      # INSTALL DEPENDENCIES + RESTART PM2
      # =========================================

      - name: Restart Application
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}

          script: |

            export PATH=$PATH:/usr/bin:/usr/local/bin

            cd /home/s2209682-node/htdocs/s2209682n.ncgrp.xyz/Cloud/hospital-room-management
            
             rm -rf node_modules

            /usr/bin//usr/bin/npm install --omit=dev --no-fund --no-audit

            /usr/local/bin/pm2 restart hospital-system || /usr/local/bin/pm2 start app.js --name hospital-system
