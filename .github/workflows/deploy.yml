cat > .github/workflows/deploy.yml <<'EOF'
name: Hospital Management Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  docker-deploy:
    name: Deploy Docker Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload project files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "./*"
          target: "/home/s2209682-node/htdocs/s2209682n.ncgrp.xyz/Cloud/hospital-room-management"
          strip_components: 1

      - name: Build and restart Docker container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -e

            APP_DIR="/home/s2209682-node/htdocs/s2209682n.ncgrp.xyz/Cloud/hospital-room-management"
            CONTAINER_NAME="hospital-system"
            IMAGE_NAME="hospital-system:latest"
            APP_PORT="3040"

            cd "$APP_DIR"

            if [ ! -f Dockerfile ]; then
              echo "ERROR: Dockerfile not found"
              exit 1
            fi

            echo "Stopping PM2 app if running..."
            pm2 stop hospital-management || true
            pm2 delete hospital-management || true

            echo "Stopping old Docker container..."
            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true

            echo "Removing containers using port $APP_PORT..."
            PORT_CONTAINERS=$(docker ps -aq --filter "publish=${APP_PORT}")
            if [ -n "$PORT_CONTAINERS" ]; then
              docker stop $PORT_CONTAINERS || true
              docker rm $PORT_CONTAINERS || true
            fi

            echo "Freeing port $APP_PORT..."
            fuser -k "${APP_PORT}/tcp" || true

            echo "Removing old image..."
            docker rmi "$IMAGE_NAME" || true

            echo "Building image..."
            docker build -t "$IMAGE_NAME" .

            echo "Starting container..."
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --env-file .env \
              -p "${APP_PORT}:${APP_PORT}" \
              "$IMAGE_NAME"

            docker ps
            docker logs "$CONTAINER_NAME"
EOF