name: Hospital Management Docker CI/CD

on:
  push:
    branches:
      - main

jobs:

  docker-deploy:

    name: Deploy Docker Container

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove Git metadata
        run: |
          rm -rf .git
          rm -rf .github

      - name: Upload project files to server
        uses: appleboy/scp-action@v0.1.7

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}

          port: 22
          source: "./*"
          target: "/home/s2209682-node/htdocs/s2209682n.ncgrp.xyz/Cloud/hospital-room-management"
          strip_components: 1

      - name: Build and restart Docker container
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}

          port: 22

          script: |

            set -e

            APP_DIR="/home/s2209682-node/htdocs/s2209682n.ncgrp.xyz/Cloud/hospital-room-management"
            CONTAINER_NAME="hospital-system"
            IMAGE_NAME="hospital-system:latest"
            APP_PORT="3040"

            cd "$APP_DIR"

            echo "========================================="
            echo "CURRENT DIRECTORY"
            echo "========================================="
            pwd

            echo "========================================="
            echo "PROJECT FILES"
            echo "========================================="
            ls -la

            if [ ! -f Dockerfile ]; then
              echo "ERROR: Dockerfile not found"
              exit 1
            fi

            echo "========================================="
            echo "STOP PM2 APP IF RUNNING"
            echo "========================================="
            pm2 stop hospital-management || true
            pm2 delete hospital-management || true

            echo "========================================="
            echo "STOP OLD DOCKER CONTAINER"
            echo "========================================="
            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true

            echo "========================================="
            echo "FREE PORT 3040 IF STILL IN USE"
            echo "========================================="
            fuser -k "${APP_PORT}/tcp" || true

            echo "========================================="
            echo "REMOVE OLD IMAGE"
            echo "========================================="
            docker rmi "$IMAGE_NAME" || true

            echo "========================================="
            echo "CLEAN DOCKER CACHE"
            echo "========================================="
            docker system prune -f || true

            echo "========================================="
            echo "BUILD NEW IMAGE"
            echo "========================================="
            docker build -t "$IMAGE_NAME" .

            echo "========================================="
            echo "START NEW CONTAINER"
            echo "========================================="
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --env-file .env \
              -p 3040:3040 \
              "$IMAGE_NAME"

            echo "========================================="
            echo "VERIFY CONTAINER"
            echo "========================================="
            docker ps
            docker logs "$CONTAINER_NAME"
